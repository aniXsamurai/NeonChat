<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon ChatRooms</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- WebSocket -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>

<body>

    <!-- ===== ROOM MODAL ===== -->
    <div id="room-modal" class="modal-overlay hidden">
        <div class="modal-box">

            <h3>⚡ Room Created!</h3>
            <p class="modal-sub">Share this code with your friends to join:</p>

            <!-- Room Code -->
            <div class="code-display-box">
                <span id="modal-room-code"></span>
                <button id="btn-copy-code" class="copy-btn">📋 Copy</button>
            </div>

            <p id="copy-feedback" class="copy-feedback hidden">✅ Copied to clipboard!</p>

            <!-- Link -->
            <p class="modal-sub" style="margin-top:1.25rem;">
                Or share this link to join directly:
            </p>

            <!-- 🔥 Added 'link' class for styling -->
            <div class="code-display-box link">
                <span id="modal-room-link" class="room-link-text"></span>
                <button id="btn-copy-link" class="copy-btn">📋 Copy</button>
            </div>

            <!-- Enter Button -->
            <button id="btn-enter-room" class="neon-btn cyan" style="width:100%; margin-top:1.5rem;">
                ENTER ROOM →
            </button>

        </div>
    </div>


    <!-- ===== WELCOME PAGE ===== -->
    <div id="welcome-page" class="page-container">
        <div class="neon-panel">

            <h1 class="neon-title">
                NEON<span class="cyan-text">CHAT</span>
            </h1>

            <p>Welcome to the grid. Connect with your peers.</p>

            <!-- Username -->
            <div class="form-group">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter your Codename" 
                    autocomplete="off"
                />
            </div>

            <!-- Default Actions -->
            <div id="default-action-group">

                <div class="action-buttons">
                    <button id="btn-host" class="neon-btn pink">
                        HOST ROOM
                    </button>
                </div>

                <div class="divider">OR</div>

                <!-- Join -->
                <div class="form-group join-group">
                    <input 
                        type="text" 
                        id="room-code-input" 
                        placeholder="Enter Room Code"
                        autocomplete="off"
                        maxlength="6"
                        style="text-transform:uppercase;"
                    />
                    <button id="btn-join" class="neon-btn-join">
                        JOIN
                    </button>
                </div>
            </div>

            <!-- Direct Join -->
            <div id="direct-join-group" class="hidden">
                <button id="btn-direct-join" class="neon-btn cyan" style="width:100%;">
                    JOIN ROOM <span id="direct-join-room-code"></span>
                </button>
            </div>

            <!-- Error -->
            <p id="join-error" class="join-error hidden">
                ❌ Enter both a Codename and a valid Room Code.
            </p>

        </div>
    </div>


    <!-- ===== CHAT PAGE ===== -->
    <div id="chat-page" class="page-container hidden">
        <div class="chat-container">

            <!-- Header -->
            <div class="chat-header">

                <div>
                    <h2>
                        Room: 
                        <span id="room-code-display" class="cyan-text"></span>

                        <button 
                            id="btn-copy-header" 
                            class="copy-inline-btn" 
                            title="Copy room code"
                        >
                            📋
                        </button>
                    </h2>

                    <div class="online-indicator">
                        <span class="dot"></span> Online
                    </div>
                </div>

                <button id="btn-leave" class="neon-btn-small pink">
                    Leave
                </button>

            </div>

            <!-- Messages -->
            <div id="chat-messages" class="chat-messages"></div>

            <!-- Input -->
            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Type a message..."
                    autocomplete="off"
                />
                <button id="btn-send" class="neon-btn cyan send-btn">
                    SEND
                </button>
            </div>

        </div>
    </div>


    <!-- Script -->
    <script src="/js/app.js"></script>

</body>
</html>
